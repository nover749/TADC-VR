<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Circus Level - Sky Change</title>
<style>
body {
    margin: 0;
    background: #111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
#container {
    width: 640px;
    height: 480px;
    border: 4px solid white;
}
canvas {
    width:100%;
    height:100%;
    image-rendering: pixelated;
}
</style>
</head>
<body>

<div id="container">
<canvas id="game"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const WIDTH = 160;
const HEIGHT = 120;

canvas.width = WIDTH;
canvas.height = HEIGHT;

// PLAYER
let px = 10;
let pz = -10;
let angle = Math.PI;

// MAP LEGEND
// 0 = empty, 1 = wall
const map = [
"111111111111111111111",
"100000000000000000001",
"100000000000000000001",
"100000000000000000001",
"100000000000000000001",
"100000000000000000001",
"100000000000000000001",
"100000000000000000001",
"100000000000000000001",
"100000000000000000001",
"100000000000000000001",
"100000000000000000001",
"100000000000000000001",
"111111111111011111111" // bottom wall with entrance hole
];

const mapW = map[0].length;
const mapH = map.length;

const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// collision
function isWall(x,z){
    let mx = Math.floor(x);
    let mz = Math.floor(z);
    if(mx<0||mz<0||mx>=mapW||mz>=mapH) return false;
    return map[mz][mx] === "1";
}

// update
function update(){
    let speed = 0.08;
    let nx = px;
    let nz = pz;

    if(keys["w"]){
        nx += Math.sin(angle)*speed;
        nz += Math.cos(angle)*speed;
    }
    if(keys["s"]){
        nx -= Math.sin(angle)*speed;
        nz -= Math.cos(angle)*speed;
    }
    if(keys["a"]){
        nx -= Math.cos(angle)*speed;
        nz += Math.sin(angle)*speed;
    }
    if(keys["d"]){
        nx += Math.cos(angle)*speed;
        nz -= Math.sin(angle)*speed;
    }

    if(!isWall(nx,nz)){
        px = nx;
        pz = nz;
    }

    if(keys[","]) angle -= 0.05;
    if(keys["."]) angle += 0.05;
}

// render floor + ceiling with sky color change
function renderFloorAndSky(){
    // Check if player is inside circus
    let insideCircus = px > 1 && px < mapW-2 && pz > 1 && pz < mapH-2;

    // Ceiling color: red inside, blue outside
    ctx.fillStyle = insideCircus ? "#FF4500" : "#87CEEB";
    ctx.fillRect(0,0,WIDTH,HEIGHT/2);

    // Floor checkerboard
    for(let y=HEIGHT/2;y<HEIGHT;y++){
        let p=(y-HEIGHT/2)/(HEIGHT/2);
        for(let xPix=0;xPix<WIDTH;xPix++){
            let rayAngle = angle + (xPix/WIDTH - 0.5);
            let worldX = px + Math.sin(rayAngle)/p;
            let worldZ = pz + Math.cos(rayAngle)/p;
            let checker=(Math.floor(worldX)+Math.floor(worldZ))%2;
            ctx.fillStyle=checker?"white":"black";
            ctx.fillRect(xPix,y,1,1);
        }
    }
}

// render walls and triangular ceiling
function renderWallsAndCeiling(){
    for(let x=0;x<WIDTH;x++){
        let rayAngle = angle + (x/WIDTH-0.5);
        let dist = 0;
        while(dist<40){
            dist+=0.05;
            let testX = px + Math.sin(rayAngle)*dist;
            let testZ = pz + Math.cos(rayAngle)*dist;

            let mx=Math.floor(testX);
            let mz=Math.floor(testZ);

            if(mx>=0 && mz>=0 && mx<mapW && mz<mapH){
                let tile = map[mz][mx];
                if(tile==="1"){
                    // Wall height
                    let wallH=HEIGHT/(dist*0.35);
                    let start=HEIGHT/2 - wallH/2;

                    // Striped walls
                    let stripeIndex = Math.floor(testX*2 + testZ*2);
                    ctx.fillStyle = stripeIndex % 2 === 0 ? "red" : "yellow";
                    ctx.fillRect(x,start,1,wallH);

                    // Triangular ceiling (world-relative)
                    let roofHeight = wallH*0.8;
                    let peakHeight = start - roofHeight;
                    ctx.beginPath();
                    ctx.moveTo(x, start);          
                    ctx.lineTo(x + 0.5, peakHeight);  
                    ctx.lineTo(x + 1, start);         
                    ctx.closePath();
                    ctx.fillStyle = stripeIndex % 2 === 0 ? "red" : "yellow";
                    ctx.fill();

                    break;
                }
            }
        }
    }
}

// main loop
function loop(){
    update();
    renderFloorAndSky();
    renderWallsAndCeiling();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
